<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.puddingcamp.com/static/appicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="https://cdn.puddingcamp.com/static/appicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.puddingcamp.com/static/appicons/favicon-16x16.png">
    <meta property="og:site_name" content="WithSeungzzang">
    <meta property="og:url" content="https://WithSeungzzang.site/">   
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>승짱과 약속잡기 캘린더</title>
    <script type="module" crossorigin src="./assets/index-BLZavtDJ.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CeNTDwwu.css">
  </head>
  <body>
    <div id="root"></div>
    <a
      id="account-manage-button"
      href="/app/account.html"
      style="
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 50;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 12px;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid rgba(148, 163, 184, 0.8);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        display: none;
      "
    >
      계정 관리
    </a>
    <script>
      (function () {
        var btn = document.getElementById("account-manage-button");
        if (!btn) return;

        function updateVisibility() {
          var path = window.location.pathname;
          if (path === "/app" || path === "/app/") {
            btn.style.display = "inline-flex";
          } else {
            btn.style.display = "none";
          }
        }

        // 초기 상태
        updateVisibility();

        // history API 패치해서 SPA 라우트 변경 감지
        function patchHistory(method) {
          var orig = history[method];
          if (typeof orig !== "function") return;
          history[method] = function () {
            var result = orig.apply(this, arguments);
            try {
              updateVisibility();
            } catch (e) {
              console.error(e);
            }
            return result;
          };
        }

        patchHistory("pushState");
        patchHistory("replaceState");

        window.addEventListener("popstate", updateVisibility);
      })();
    </script>
  </body>
</html>
